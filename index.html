<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Quiz Game</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link href="style.css" rel="stylesheet" />
</head>
<body class="d-flex align-items-center">
  <div class="container py-4">
    <div class="mx-auto game-shell">
      <div class="glass-card p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h1 class="h3 fw-bold mb-1">Quiz Dash</h1>
            <p class="text-muted mb-0">Pick a category and beat the clock.</p>
          </div>
          <div class="score-pill" id="highScoreText">High Score: 0</div>
        </div>

        <section id="startScreen">
          <div class="mb-4">
            <div class="chip mb-2">Choose your arena</div>
            <h2 class="h4 fw-semibold">Select a category</h2>
          </div>
          <div class="d-grid gap-3">
            <button class="btn btn-outline-ink py-3" data-category="Tech">Tech Sprint</button>
            <button class="btn btn-outline-ink py-3" data-category="General">General Sparks</button>
          </div>
          <div class="mt-4 text-muted small">
            Each question is timed. Score boosts with speed.
          </div>
        </section>

        <section id="quizScreen" class="section-hidden">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
            <div>
              <div class="chip" id="categoryChip">Category</div>
              <div class="fw-semibold" id="questionCounter">Question 1 of 5</div>
            </div>
            <div class="d-flex align-items-center gap-3">
              <div class="timer-ring" id="timerRing"><span id="timerText">12</span></div>
              <div class="score-pill">Score: <span id="scoreText">0</span></div>
            </div>
          </div>

          <div class="progress mb-3" style="height: 10px;">
            <div
              class="progress-bar"
              id="progressBar"
              role="progressbar"
              style="width: 0%"
              aria-valuemin="0"
              aria-valuemax="100"
            ></div>
          </div>

          <div id="questionWrap" class="fade-slide">
            <h2 class="h4 fw-bold mb-3" id="questionText">Question</h2>
            <div class="d-grid gap-2" id="optionsWrap"></div>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-4">
            <div class="text-muted small" id="bonusText">Bonus: 0</div>
            <button class="btn btn-accent px-4" id="nextBtn" disabled>Next</button>
          </div>
        </section>

        <section id="resultScreen" class="section-hidden text-center">
          <div class="chip mb-2">Final Result</div>
          <h2 class="h3 fw-bold">Your Score</h2>
          <div class="display-5 fw-bold my-3" id="finalScore">0/0</div>
          <div class="text-muted" id="pointsText">Total points: 0</div>
          <p class="lead" id="resultMessage">Well played.</p>
          <button class="btn btn-accent px-4 mt-3" id="restartBtn">Restart Quiz</button>
        </section>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
